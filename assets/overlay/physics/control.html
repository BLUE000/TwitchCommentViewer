<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Twitch Physics Avatar - Control Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 管理画面特有の背景表示 */
        body {
            background-color: #2a2a2a;
            color: white;
            user-select: none;
        }

        #panel-header {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ff8c00;
            pointer-events: none;
            font-family: Outfit, sans-serif;
        }

        #panel-header h1 {
            margin: 0;
            font-size: 16px;
            color: #ff8c00;
        }

        #panel-header p {
            margin: 5px 0 0 0;
            font-size: 11px;
            color: #ccc;
        }

        /* 落下領域を視覚化するためのガイドライン */
        #ground-guide {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: #ff8c00;
            box-shadow: 0 -2px 10px rgba(255, 140, 0, 0.5);
        }

        /* 管理画面用境界枠 (共通 style.css から管理画面専用へ移設) */
        #bounds-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            background-color: #2a2a2a; /* 背景は body と合わせてダークテーマに */
        }

        #bounds-frame {
            position: absolute;
            border: 3px dashed #ff8c00; /* 管理枠はオレンジの点線に変更 */
            background-color: #1a1a1a; /* ダークテーマ用の背景 */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            overflow: hidden;
        }

        #bounds-title {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #ff8c00;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 8px;
            border-radius: 6px;
            pointer-events: none;
            z-index: 10;
            border: 1px solid rgba(255, 140, 0, 0.3);
        }
    </style>
</head>
<body>
    <div id="panel-header">
        <h1>アバター位置操作パネル</h1>
        <p>アバターをドラッグ＆ドロップして位置を同期・ダブルクリックでエフェクトを発生させます</p>
    </div>

    <div id="bounds-wrapper">
        <div id="bounds-frame">
            <div id="bounds-title">OBS 画面枠</div>
        </div>
    </div>

    <script>
        let wsPort = 8082; // デフォルトのフォールバック
        if (window.location.port) {
            wsPort = parseInt(window.location.port) + 1;
        }

        const wsHost = window.location.hostname || 'localhost';
        console.log(`Connecting to WebSocket on ${wsHost}:${wsPort}...`);
        const ws = new WebSocket('ws://' + wsHost + ':' + wsPort);

        let minSize = 50;
        let maxSize = 150;
        let obsBrowserWidth = 800;
        let obsBrowserHeight = 600;
        let effectSymbols = "♥,♦,♣,♠";
        let effectSize = 20;
        let effectCount = 5;
        let effectOpacity = 100;

        let scale = 1.0;
        let avatars = [];
        let activeDraggedAvatar = null;

        function getDeterministicRandom(str) {
            let hash = 2166136261;
            for (let i = 0; i < str.length; i++) {
                hash ^= str.charCodeAt(i);
                hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
            }
            return (hash >>> 0) / 4294967295;
        }
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        const defaultAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23ff8c00"/><text x="50%" y="65%" font-size="40" font-family="Outfit" font-weight="bold" fill="white" text-anchor="middle">💬</text></svg>';

        ws.onopen = () => {
            console.log('Connected to OBS WebSocket Server');
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.action === 'comment') {
                handleComment(data.username, data.message, data.avatarUrl);
            } else if (data.action === 'settings_changed') {
                minSize = data.minSize || 50;
                maxSize = data.maxSize || 150;
                obsBrowserWidth = data.obsBrowserWidth || 800;
                obsBrowserHeight = data.obsBrowserHeight || 600;
                effectSymbols = data.effectSymbols || "♥,♦,♣,♠";
                effectSize = data.effectSize || 20;
                effectCount = data.effectCount || 5;
                effectOpacity = data.effectOpacity !== undefined ? data.effectOpacity : 100;

                updateBoundsScale();
                applySettings();
            } else if (data.action === 'double_click') {
                // 他の管理画面から送られた場合にもエフェクト同期
                const av = avatars.find(a => a.userId === data.userId.toLowerCase());
                if (av) {
                    createParticles(av.x + av.size / 2, av.y + av.size / 2);
                }
            }
        };

        function updateBoundsScale() {
            const padding = 70; // ヘッダー用の余白
            const availW = window.innerWidth - 40;
            const availH = window.innerHeight - padding - 40;

            scale = Math.min(availW / obsBrowserWidth, availH / obsBrowserHeight);
            if (scale <= 0) scale = 0.1;

            const dx = (window.innerWidth - obsBrowserWidth * scale) / 2;
            const dy = padding + (availH - obsBrowserHeight * scale) / 2;

            const frame = document.getElementById('bounds-frame');
            frame.style.width = `${obsBrowserWidth}px`;
            frame.style.height = `${obsBrowserHeight}px`;
            frame.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
            frame.style.transformOrigin = 'top left';

            const title = document.getElementById('bounds-title');
            title.textContent = `OBS 画面枠 (${obsBrowserWidth}x${obsBrowserHeight})`;
        }

        window.addEventListener('resize', updateBoundsScale);
        updateBoundsScale();

        function handleComment(username, message, avatarUrl) {
            const userId = username.toLowerCase();
            let av = avatars.find(a => a.userId === userId);

            if (av) {
                av.commentCount++;
                av.size = Math.min(maxSize, minSize + av.commentCount * 10);
                av.element.style.width = `${av.size}px`;
                av.element.style.height = `${av.size}px`;
            } else {
                const frame = document.getElementById('bounds-frame');
                const avDiv = document.createElement('div');
                avDiv.className = 'avatar-container control-avatar';
                avDiv.style.width = `${minSize}px`;
                avDiv.style.height = `${minSize}px`;

                const img = document.createElement('img');
                img.className = 'avatar-image';
                img.src = avatarUrl || defaultAvatar;
                avDiv.appendChild(img);

                frame.appendChild(avDiv);

                const size = minSize;

                // 重複防止のための決定論的スポーン座標Xの算出
                const rp = getDeterministicRandom(userId);
                const spawnX = (obsBrowserWidth - size) * (0.2 + 0.6 * rp);

                av = {
                    userId: userId,
                    username: username,
                    avatarUrl: avatarUrl || defaultAvatar,
                    element: avDiv,
                    x: spawnX,
                    y: 50,
                    size: size,
                    commentCount: 1
                };

                // 初期配置
                avDiv.style.transform = `translate(${av.x}px, ${av.y}px)`;
                avatars.push(av);

                // ドラッグイベントの登録
                avDiv.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return; // 左クリックのみ
                    startDrag(av, e);
                });

                // ダブルクリックイベント
                avDiv.addEventListener('dblclick', () => {
                    ws.send(JSON.stringify({
                        action: 'double_click',
                        userId: av.userId
                    }));
                    createParticles(av.x + av.size / 2, av.y + av.size / 2);
                });

                // アバター上限（最大30人）監視
                if (avatars.length > 30) {
                    const oldest = avatars.shift();
                    oldest.element.classList.add('fade-out');
                    setTimeout(() => {
                        if (oldest.element.parentNode) {
                            oldest.element.parentNode.removeChild(oldest.element);
                        }
                    }, 500);
                }
            }
        }

        function startDrag(av, e) {
            activeDraggedAvatar = av;
            // スケールされた座標系でのオフセットを算出
            dragOffsetX = e.clientX / scale - av.x;
            dragOffsetY = e.clientY / scale - av.y;

            // ドラッグ開始をサーバーへ通知
            ws.send(JSON.stringify({
                action: 'drag_start',
                userId: av.userId
            }));
        }

        document.addEventListener('mousemove', (e) => {
            if (!activeDraggedAvatar) return;

            const av = activeDraggedAvatar;
            av.x = e.clientX / scale - dragOffsetX;
            av.y = e.clientY / scale - dragOffsetY;

            // 境界の補正 (1:1の実解像度枠内に収める)
            if (av.x < 0) av.x = 0;
            if (av.x + av.size > obsBrowserWidth) av.x = obsBrowserWidth - av.size;
            if (av.y < 0) av.y = 0;
            if (av.y + av.size > obsBrowserHeight) av.y = obsBrowserHeight - av.size;

            // 表示位置の更新
            av.element.style.transform = `translate(${av.x}px, ${av.y}px)`;

            // ドラッグ座標同期メッセージの送信 (1:1座標)
            ws.send(JSON.stringify({
                action: 'drag_move',
                userId: av.userId,
                x: av.x,
                y: av.y
            }));
        });

        document.addEventListener('mouseup', () => {
            if (!activeDraggedAvatar) return;

            const av = activeDraggedAvatar;
            activeDraggedAvatar = null;

            // ドラッグ終了をサーバーへ通知
            ws.send(JSON.stringify({
                action: 'drag_end',
                userId: av.userId
            }));
        });

        function createParticles(x, y) {
            const frame = document.getElementById('bounds-frame');
            if (!frame) return;

            const symbols = effectSymbols.split(',').map(s => s.trim()).filter(s => s.length > 0);
            if (symbols.length === 0) return;

            for (let i = 0; i < effectCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                p.style.left = `${x}px`;
                p.style.top = `${y}px`;
                p.style.fontSize = `${effectSize}px`;

                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 60;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance - 30; // 上方向バイアス

                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);
                p.style.setProperty('--effect-opacity', effectOpacity / 100);

                frame.appendChild(p);

                setTimeout(() => {
                    p.remove();
                }, 1000);
            }
        }

        function applySettings() {
            avatars.forEach(av => {
                av.size = Math.min(maxSize, minSize + av.commentCount * 10);
                av.element.style.width = `${av.size}px`;
                av.element.style.height = `${av.size}px`;
                
                // サイズ変更による位置補正
                if (av.x + av.size > obsBrowserWidth) av.x = obsBrowserWidth - av.size;
                if (av.y + av.size > obsBrowserHeight) av.y = obsBrowserHeight - av.size;
                av.element.style.transform = `translate(${av.x}px, ${av.y}px)`;
            });
        }
    </script>
</body>
</html>
