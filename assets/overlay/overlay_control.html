<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Twitch Physics Avatar - Control Panel</title>
    <link rel="stylesheet" href="style_physics.css">
    <style>
        /* 管理画面特有の背景表示 */
        body {
            background-color: #2a2a2a;
            color: white;
            user-select: none;
        }

        #panel-header {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ff8c00;
            pointer-events: none;
            font-family: Outfit, sans-serif;
        }

        #panel-header h1 {
            margin: 0;
            font-size: 16px;
            color: #ff8c00;
        }

        #panel-header p {
            margin: 5px 0 0 0;
            font-size: 11px;
            color: #ccc;
        }

        /* 落下領域を視覚化するためのガイドライン */
        #ground-guide {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: #ff8c00;
            box-shadow: 0 -2px 10px rgba(255, 140, 0, 0.5);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="panel-header">
        <h1>アバター位置操作パネル</h1>
        <p>アバターをドラッグ＆ドロップして位置を同期できます</p>
    </div>

    <div id="container"></div>
    <div id="ground-guide"></div>

    <script>
        let wsPort = 8082; // デフォルトのフォールバック
        if (window.location.port) {
            wsPort = parseInt(window.location.port) + 1;
        }

        console.log(`Connecting to WebSocket on port ${wsPort}...`);
        const ws = new WebSocket('ws://localhost:' + wsPort);

        let minSize = 50;
        let maxSize = 150;
        let avatars = [];
        let activeDraggedAvatar = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        const defaultAvatar = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="%23ff8c00"/><text x="50%" y="65%" font-size="40" font-family="Outfit" font-weight="bold" fill="white" text-anchor="middle">💬</text></svg>';

        ws.onopen = () => {
            console.log('Connected to OBS WebSocket Server');
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.action === 'comment') {
                handleComment(data.username, data.message, data.avatarUrl);
            } else if (data.action === 'settings_changed') {
                minSize = data.minSize || 50;
                maxSize = data.maxSize || 150;
                applySettings();
            }
        };

        function handleComment(username, message, avatarUrl) {
            const userId = username.toLowerCase();
            let av = avatars.find(a => a.userId === userId);

            if (av) {
                av.commentCount++;
                av.size = Math.min(maxSize, minSize + av.commentCount * 10);
                av.element.style.width = `${av.size}px`;
                av.element.style.height = `${av.size}px`;
            } else {
                const container = document.getElementById('container');
                const avDiv = document.createElement('div');
                avDiv.className = 'avatar-container control-avatar';
                avDiv.style.width = `${minSize}px`;
                avDiv.style.height = `${minSize}px`;

                const img = document.createElement('img');
                img.className = 'avatar-image';
                img.src = avatarUrl || defaultAvatar;
                avDiv.appendChild(img);

                container.appendChild(avDiv);

                const windowWidth = window.innerWidth;
                const size = minSize;

                av = {
                    userId: userId,
                    username: username,
                    avatarUrl: avatarUrl || defaultAvatar,
                    element: avDiv,
                    x: (windowWidth - size) / 2,
                    y: 50,
                    size: size,
                    commentCount: 1
                };

                // 初期配置
                avDiv.style.transform = `translate(${av.x}px, ${av.y}px)`;
                avatars.push(av);

                // ドラッグイベントの登録
                avDiv.addEventListener('mousedown', (e) => {
                    startDrag(av, e);
                });

                // アバター上限（最大30人）監視
                if (avatars.length > 30) {
                    const oldest = avatars.shift();
                    oldest.element.classList.add('fade-out');
                    setTimeout(() => {
                        if (oldest.element.parentNode) {
                            oldest.element.parentNode.removeChild(oldest.element);
                        }
                    }, 500);
                }
            }
        }

        function startDrag(av, e) {
            activeDraggedAvatar = av;
            dragOffsetX = e.clientX - av.x;
            dragOffsetY = e.clientY - av.y;

            // ドラッグ開始をサーバーへ通知
            ws.send(JSON.stringify({
                action: 'drag_start',
                userId: av.userId
            }));
        }

        document.addEventListener('mousemove', (e) => {
            if (!activeDraggedAvatar) return;

            const av = activeDraggedAvatar;
            av.x = e.clientX - dragOffsetX;
            av.y = e.clientY - dragOffsetY;

            // 境界の補正
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            if (av.x < 0) av.x = 0;
            if (av.x + av.size > windowWidth) av.x = windowWidth - av.size;
            if (av.y < 0) av.y = 0;
            if (av.y + av.size > windowHeight) av.y = windowHeight - av.size;

            // 表示位置の更新
            av.element.style.transform = `translate(${av.x}px, ${av.y}px)`;

            // ドラッグ座標同期メッセージの送信
            ws.send(JSON.stringify({
                action: 'drag_move',
                userId: av.userId,
                x: av.x,
                y: av.y
            }));
        });

        document.addEventListener('mouseup', () => {
            if (!activeDraggedAvatar) return;

            const av = activeDraggedAvatar;
            activeDraggedAvatar = null;

            // ドラッグ終了をサーバーへ通知
            ws.send(JSON.stringify({
                action: 'drag_end',
                userId: av.userId
            }));
        });

        function applySettings() {
            avatars.forEach(av => {
                av.size = Math.min(maxSize, minSize + av.commentCount * 10);
                av.element.style.width = `${av.size}px`;
                av.element.style.height = `${av.size}px`;
            });
        }
    </script>
</body>
</html>
